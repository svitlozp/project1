
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навчальний курс: Геометрія Робота</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dot-grid {
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        .step-transition { transition: all 0.4s ease-in-out; }
        .code-block { font-family: 'Fira Code', monospace; }
        .vector-text { font-weight: bold; text-decoration: overline; }
        sub { font-size: 0.75em; }
        .simulation-active { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i data-lucide="book-open"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none">Геометрія Робота: Інтерактивний курс</h1>
                <p class="text-xs text-slate-500 font-medium">Від координат до автономного патрулювання</p>
            </div>
        </div>
        <div id="step-indicator" class="flex gap-1">
            <!-- Дотки прогресу -->
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-full md:w-[420px] bg-white border-r border-slate-200 flex flex-col shadow-sm z-10">
            <div class="p-6 flex-1 overflow-y-auto">
                <div id="step-content">
                    <!-- Контент кроку -->
                </div>
            </div>

            <!-- Навігація -->
            <div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center">
                <button id="prev-btn" onclick="prevStep()" class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-slate-600 hover:text-indigo-600 disabled:opacity-30 transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Назад
                </button>
                <div id="sim-controls" class="hidden text-center flex-1 mx-2">
                    <button onclick="runSimulation()" id="run-sim-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg font-bold text-[10px] uppercase flex items-center gap-2 transition-all shadow-md mx-auto">
                        <i data-lucide="play" class="w-3 h-3"></i> Запустити аналіз
                    </button>
                </div>
                <button id="next-btn" onclick="nextStep()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold text-sm shadow-md transition-all">
                    Далі <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="flex-1 relative dot-grid flex items-center justify-center p-4 bg-slate-100">
            <div class="relative bg-white rounded-2xl border border-slate-200 shadow-2xl overflow-hidden" style="width: 600px; height: 500px;">
                <svg id="field" width="600" height="500" viewBox="0 0 600 500" class="select-none cursor-crosshair">
                    <defs>
                        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
                        </marker>
                        <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e" />
                        </marker>
                    </defs>

                    <!-- Coordinate Grid Axes -->
                    <g id="grid-axes">
                        <line x1="300" y1="0" x2="300" y2="500" stroke="#cbd5e1" stroke-width="2" />
                        <line x1="0" y1="250" x2="600" y2="250" stroke="#cbd5e1" stroke-width="2" />
                    </g>

                    <polygon id="area-fill" points="" fill="rgba(99, 102, 241, 0.05)" />
                    <path id="path-line" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="5 5" />
                    
                    <line id="vec1" x1="0" y1="0" x2="0" y2="0" stroke="#6366f1" stroke-width="4" marker-end="url(#arrow)" class="hidden" />
                    <line id="vec2" x1="0" y1="0" x2="0" y2="0" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-red)" class="hidden" />

                    <g id="points-layer"></g>

                    <g id="robot-icon" class="hidden opacity-0 transition-all duration-300">
                        <circle r="22" fill="rgba(79, 70, 229, 0.1)" class="animate-pulse" />
                        <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#4f46e5" />
                        <circle cx="0" cy="-18" r="3" fill="#fbbf24" />
                        <line x1="0" y1="-12" x2="0" y2="-18" stroke="#fbbf24" stroke-width="2" />
                    </g>
                </svg>

                <div id="sim-status-overlay" class="absolute top-4 left-4 bg-white/90 backdrop-blur border border-slate-200 px-4 py-2 rounded-xl text-xs hidden shadow-sm">
                    <div id="sim-turn-count" class="font-bold text-slate-700">Поворот: 0 / 0</div>
                    <div id="sim-convexity-info" class="text-indigo-600 font-medium mt-1">Очікування...</div>
                </div>

                <div class="absolute top-4 right-4 bg-white/80 backdrop-blur border border-slate-200 px-3 py-1 rounded-full text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                    Сітка: 1 клітинка = 1 од.
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentStep = 0;
        let isSimulating = false;
        const GRID_STEP = 40;
        const CENTER_X = 300;
        const CENTER_Y = 250;

        let points = [
            { x: -3, y: -2, label: '1' },
            { x: 1, y: 2, label: '2' },
            { x: 5, y: -1, label: '3' },
            { x: 3, y: 4, label: '4' },
            { x: -4, y: 3, label: '5' }
        ];

        // Допоміжні функції координат
        const toPxX = (gx) => CENTER_X + gx * GRID_STEP;
        const toPxY = (gy) => CENTER_Y - gy * GRID_STEP;
        const fromPxX = (px) => Math.round((px - CENTER_X) / GRID_STEP);
        const fromPxY = (py) => Math.round((CENTER_Y - py) / GRID_STEP);

        const steps = [
            {
                title: "Етап 0: Координати та Вектори",
                description: `Будь-який вектор на площині визначається двома точками. Характеристики вектора — це різниця координат його кінця та початку.`,
                math: (p) => {
                    const dx = p[1].x - p[0].x;
                    const dy = p[1].y - p[0].y;
                    return `Точки: P<sub>1</sub>(${p[0].x}, ${p[0].y}), P<sub>2</sub>(${p[1].x}, ${p[1].y}) <br> <span class="vector-text">v</span> = (<b>${dx}</b>, <b>${dy}</b>)`;
                },
                code: "v_x = x2 - x1\nv_y = y2 - y1\nlength = (v_x**2 + v_y**2)**0.5",
                setup: () => { showVectors(true, false); hideRobot(); }
            },
            {
                title: "Етап 1: Вектор руху",
                description: `Робот сприймає шлях як переміщення. Перший вектор <span class='vector-text'>v</span><sub>1</sub> задає початковий напрямок від точки 1 до 2.`,
                math: (p) => {
                    const dx = p[1].x - p[0].x;
                    const dy = p[1].y - p[0].y;
                    return `<span class="vector-text">v</span><sub>1</sub> = (<b>${dx}</b>, <b>${dy}</b>)`;
                },
                code: "v1 = (p2.x - p1.x, p2.y - p1.y)",
                setup: () => { showVectors(true, false); hideRobot(); }
            },
            {
                title: "Етап 2: Побудова кута",
                description: `Коли з'являється точка 3, утворюється другий вектор. Ми маємо два вектори, що виходять з однієї точки (2).`,
                math: (p) => {
                    const dx = p[2].x - p[1].x;
                    const dy = p[2].y - p[1].y;
                    return `<span class="vector-text">v</span><sub>2</sub> = (<b>${dx}</b>, <b>${dy}</b>)`;
                },
                code: "v2 = (p3.x - p2.x, p3.y - p2.y)",
                setup: () => { showVectors(true, true); hideRobot(); }
            },
            {
                title: "Етап 3: Векторний добуток",
                description: `Щоб не рахувати кути, ми використовуємо векторний добуток <b>D</b>. Він показує взаємне розташування цих двох векторів.`,
                math: (p) => {
                    const v1 = {x: p[1].x-p[0].x, y: p[1].y-p[0].y};
                    const v2 = {x: p[2].x-p[1].x, y: p[2].y-p[1].y};
                    const d = v1.x * v2.y - v1.y * v2.x;
                    return `D = x<sub>1</sub>y<sub>2</sub> - y<sub>1</sub>x<sub>2</sub> = <b>${d}</b>`;
                },
                code: "D = v1_x * v2_y - v1_y * v2_x",
                setup: () => { showVectors(true, true); hideRobot(); }
            },
            {
                title: "Етап 4: Логіка повороту",
                description: `Якщо D > 0, робот знає, що вектор <span class='vector-text'>v</span><sub>2</sub> повернутий відносно <span class='vector-text'>v</span><sub>1</sub> ліворуч.`,
                math: (p) => {
                    const v1 = {x: p[1].x-p[0].x, y: p[1].y-p[0].y};
                    const v2 = {x: p[2].x-p[1].x, y: p[2].y-p[1].y};
                    const d = v1.x * v2.y - v1.y * v2.x;
                    let res = d > 0 ? "ЛІВОРУЧ ↖️" : (d < 0 ? "ПРАВОРУЧ ↘️" : "ПРЯМО ⬆️");
                    return `<span class="text-indigo-600 font-bold">${res}</span>`;
                },
                code: "if D > 0: turn = 'Left'\nelif D < 0: turn = 'Right'",
                setup: () => { showVectors(true, true); hideRobot(); }
            },
            {
                title: "Етап 5: Опуклість маршруту",
                description: `Запустіть симуляцію. Якщо під час патрулювання всі повороти були однаковими — маршрут опуклий.`,
                math: () => `Аналіз всього циклу точок...`,
                code: "is_convex = all(d > 0 for d in results) or all(d < 0 for d in results)",
                setup: () => {
                    showVectors(false, false);
                    showRobot();
                    drawPolygon();
                    document.getElementById('sim-status-overlay').classList.remove('hidden');
                }
            }
        ];

        function init() {
            lucide.createIcons();
            updateUI();
            
            const svg = document.getElementById('field');
            let dragging = null;

            svg.addEventListener('mousedown', (e) => {
                if(isSimulating) return;
                const rect = svg.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                points.forEach((p, i) => {
                    if(Math.sqrt((toPxX(p.x)-mx)**2 + (toPxY(p.y)-my)**2) < 20) dragging = i;
                });
            });

            window.addEventListener('mousemove', (e) => {
                if(dragging !== null) {
                    const rect = svg.getBoundingClientRect();
                    points[dragging].x = fromPxX(e.clientX - rect.left);
                    points[dragging].y = fromPxY(e.clientY - rect.top);
                    updateUI();
                }
            });

            window.addEventListener('mouseup', () => dragging = null);
        }

        function updateUI() {
            const step = steps[currentStep];
            document.getElementById('step-content').innerHTML = `
                <h2 class="text-2xl font-bold text-slate-800 mb-4">${step.title}</h2>
                <p class="text-slate-600 mb-6 leading-relaxed text-sm">${step.description}</p>
                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl mb-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase text-indigo-400 mb-2 tracking-widest text-center">Розрахунок</p>
                    <div id="dynamic-math" class="text-base font-serif text-indigo-900 text-center">${step.math(points)}</div>
                </div>
                <div class="bg-slate-900 rounded-xl p-4 overflow-hidden relative shadow-inner">
                    <pre class="text-emerald-400 text-xs code-block leading-relaxed">${step.code}</pre>
                </div>
            `;
            
            document.getElementById('sim-controls').classList.toggle('hidden', currentStep !== 5);
            document.getElementById('sim-status-overlay').classList.toggle('hidden', currentStep !== 5);
            document.getElementById('prev-btn').disabled = currentStep === 0;
            document.getElementById('next-btn').classList.toggle('hidden', currentStep === 5);
            
            renderStepIndicator();
            step.setup();
            drawBase();
            lucide.createIcons();
        }

        async function runSimulation() {
            if(isSimulating) return;
            isSimulating = true;
            
            const btn = document.getElementById('run-sim-btn');
            const v1 = document.getElementById('vec1'); 
            const v2 = document.getElementById('vec2');
            const mathBox = document.getElementById('dynamic-math');
            const turnInfo = document.getElementById('sim-convexity-info');
            const turnCount = document.getElementById('sim-turn-count');
            const robot = document.getElementById('robot-icon');

            btn.disabled = true;
            btn.classList.add('opacity-50');

            const full = [...points, points[0], points[1]];
            let turns = [];

            for(let i = 0; i < points.length; i++) {
                const A = full[i]; const B = full[i+1]; const C = full[i+2];

                robot.setAttribute('transform', `translate(${toPxX(B.x)}, ${toPxY(B.y)})`);

                v1.classList.remove('hidden'); v2.classList.remove('hidden');
                v1.setAttribute('x1', toPxX(A.x)); v1.setAttribute('y1', toPxY(A.y));
                v1.setAttribute('x2', toPxX(B.x)); v1.setAttribute('y2', toPxY(B.y));
                v2.setAttribute('x1', toPxX(B.x)); v2.setAttribute('y1', toPxY(B.y));
                v2.setAttribute('x2', toPxX(C.x)); v2.setAttribute('y2', toPxY(C.y));

                const dx1 = B.x - A.x, dy1 = B.y - A.y;
                const dx2 = C.x - B.x, dy2 = C.y - B.y;
                const d = dx1 * dy2 - dy1 * dx2;
                const turnStr = d > 0 ? 'ЛІВОРУЧ' : (d < 0 ? 'ПРАВОРУЧ' : 'ПРЯМО');
                turns.push(d > 0 ? 1 : (d < 0 ? -1 : 0));

                turnCount.textContent = `Кут: ${i+1} / ${points.length}`;
                mathBox.innerHTML = `D = <b>${d}</b> &rarr; ${turnStr}`;
                
                await new Promise(r => setTimeout(r, 1000));
            }

            const uniqueTurns = new Set(turns.filter(t => t !== 0));
            if(uniqueTurns.size === 1) {
                turnInfo.textContent = "ВИСНОВОК: ОПУКЛИЙ ✅";
                turnInfo.className = "text-emerald-600 font-bold mt-1";
            } else {
                turnInfo.textContent = "ВИСНОВОК: НЕОПУКЛИЙ ❌";
                turnInfo.className = "text-rose-600 font-bold mt-1";
            }

            isSimulating = false;
            btn.disabled = false;
            btn.classList.remove('opacity-50');
            v1.classList.add('hidden'); v2.classList.add('hidden');
        }

        function renderStepIndicator() {
            const container = document.getElementById('step-indicator');
            container.innerHTML = steps.map((_, i) => `
                <div class="w-6 h-1.5 rounded-full transition-all duration-500 ${i <= currentStep ? 'bg-indigo-600' : 'bg-slate-200'}"></div>
            `).join('');
        }

        function drawBase() {
            const pointsLayer = document.getElementById('points-layer');
            const pathLine = document.getElementById('path-line');
            const dStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + ` ${toPxX(p.x)} ${toPxY(p.y)}`).join(' ');
            pathLine.setAttribute('d', dStr + (currentStep === 5 ? ' Z' : ''));

            let pointsHtml = '';
            const limit = currentStep === 5 ? points.length : (currentStep === 0 ? 2 : 3);
            for(let i = 0; i < limit; i++) {
                const p = points[i];
                const px = toPxX(p.x);
                const py = toPxY(p.y);
                pointsHtml += `
                    <g class="cursor-grab">
                        <circle cx="${px}" cy="${py}" r="8" fill="${i === 0 ? '#10b981' : (i < 3 || currentStep === 5 ? '#4f46e5' : '#cbd5e1')}" stroke="white" stroke-width="2" />
                        <text x="${px + 12}" y="${py - 12}" class="text-[11px] font-bold fill-slate-700 pointer-events-none">
                            ${i+1} (${p.x}, ${p.y})
                        </text>
                    </g>`;
            }
            pointsLayer.innerHTML = pointsHtml;
        }

        function showVectors(v1, v2) {
            const l1 = document.getElementById('vec1'); const l2 = document.getElementById('vec2');
            if(v1) {
                l1.classList.remove('hidden'); l1.setAttribute('x1', toPxX(points[0].x)); l1.setAttribute('y1', toPxY(points[0].y));
                l1.setAttribute('x2', toPxX(points[1].x)); l1.setAttribute('y2', toPxY(points[1].y));
            } else l1.classList.add('hidden');
            if(v2) {
                l2.classList.remove('hidden'); l2.setAttribute('x1', toPxX(points[1].x)); l2.setAttribute('y1', toPxY(points[1].y));
                l2.setAttribute('x2', toPxX(points[2].x)); l2.setAttribute('y2', toPxY(points[2].y));
            } else l2.classList.add('hidden');
        }

        function drawPolygon() {
            document.getElementById('area-fill').setAttribute('points', points.map(p => `${toPxX(p.x)},${toPxY(p.y)}`).join(' '));
        }

        function showRobot() {
            const r = document.getElementById('robot-icon'); r.classList.remove('hidden');
            setTimeout(() => r.classList.add('opacity-100'), 50);
            r.setAttribute('transform', `translate(${toPxX(points[0].x)}, ${toPxY(points[0].y)})`);
        }

        function hideRobot() { document.getElementById('robot-icon').classList.add('hidden', 'opacity-0'); }
        function nextStep() { if(currentStep < steps.length - 1) { currentStep++; updateUI(); } }
        function prevStep() { if(currentStep > 0) { currentStep--; updateUI(); } }

        window.onload = init;
    </script>
</body>
</html>
